<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Páscoa UMP 2026</title>

    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');

        * {
            font-family: "Roboto Mono", serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
        }

        .box-center {
            max-width: 500px;
            margin-top: 40px;
            border: 2px solid gray;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin-left: 20px;
            margin-right: 20px;
        }

        .top {
            margin-top: 20px;
            text-align: center;
        }

        .top h2 {
            font-size: 32px;
            color: #ff7700;
        }

        #content {
            margin-top: 20px;
        }

        #content a {
            text-decoration: none;
            background-color: #0068ff;
            padding: 10px 20px;
            display: flex;
            font-weight: bold;
            color: #fff;
            border-radius: 10px;
            margin-bottom: 10px;
            align-items: baseline;
            justify-content: center;
        }

        #content a.revisado {
            position: relative;
        }

        #content a.revisado::after {
            content: "Revisado";
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #00c853;
            color: #fff;
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.3);
        }

        #content a:hover {
            background-color: #0052c9;
        }

        .n-lg {
            font-size: 30px;
            margin-left: 5px;
        }

        .mb-lg {
            margin-bottom: 30px !important;
        }
    </style>
</head>

<body>
    <div class="box-center">
        <div class="top">
            <h1>Musical Páscoa UMP 2026</h1>
            <h2>Cifras</h2>
        </div>

        <div id="content">
            <a class="mb-lg revisado" href="Ele%20Vive%20-%20Leonardo%20Gon%C3%A7alves.txt">Ele Vive - Leonardo Gonçalves</a>
            <a class="revisado" href="Pra%20Sempre%20-%20Avivah.txt">Pra Sempre - Avivah</a>
            <a href="Digno%20%C3%A9%20o%20Senhor%20-%20Felipe%20Rodrigues.txt">Digno é o Senhor - Felipe Rodrigues</a>
            <a href="Isa%C3%ADas%2053%20-%20Projeto%20Sola.txt">Isaías 53 - Projeto Sola</a>
            <a href="Autor%20da%20Vida%20-%20Aline%20Barros.txt">Autor da Vida - Aline Barros</a>
            <a href="Jesus%2C%20o%20Plano%20Perfeito%20-%20Renascer%20Praise.txt">Jesus, o Plano Perfeito - Renascer Praise</a>
        </div>
    </div>
</body>

</html>

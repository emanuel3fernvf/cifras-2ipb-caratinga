<div class="scripture altzoom xbzar ayahtdv08" dir="rtl" id="scripture" lang="fa-af"><h1 class="title">کتاب مزامیر</h1><h2 class="chapter">مزمور یکصد و سی و چهارم</h2>
<h3 class="sectiontitle">دعوت به پرستش خداوند</h3>
<p class="swv">
<span class="verseno" data-name="Psa.134.1" id="v1">۱</span>بیایید خداوند را متبارک خوانید، ای جمیع بندگان خداوند که شبانگاه در خانۀ خداوند می ایستید!
<span class="endverse"></span><span class="verseno" data-name="Psa.134.2" id="v2">۲</span>دستهای خود را به قدس برافرازید، و خداوند را متبارک خوانید.
<span class="endverse"></span><span class="verseno" data-name="Psa.134.3" id="v3">۳</span>خداوند که خالق آسمان و زمین است، ترا از سهیون برکت می دهد.
<span class="endverse"></span></p></div>

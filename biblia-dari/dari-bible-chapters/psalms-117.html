<div class="scripture altzoom xbzar ayahtdv08" dir="rtl" id="scripture" lang="fa-af"><h1 class="title">کتاب مزامیر</h1><h2 class="chapter">مزمور یکصد و هفدهم</h2>
<h3 class="sectiontitle">در ستایش خداوند</h3>
<p class="swv">
<span class="verseno" data-name="Psa.117.1" id="v1">۱</span>ای جمیع امت ها خداوند را سپاس بگوئید! و ای تمامی قبایل، او را ستایش کنید!
<span class="endverse"></span><span class="verseno" data-name="Psa.117.2" id="v2">۲</span>زیرا که رحمت خداوند بر ما عظیم است و وفاداری او تا به ابد.
</p><p class="swv">هَلّلِویاه، سپاس به خداوند!
<span class="endverse"></span></p></div>
